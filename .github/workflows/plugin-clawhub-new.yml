            --clawhub-toolchain-sha256 "${CLAWHUB_TOOLCHAIN_SHA256}" \
            --clawhub-toolchain-version "${CLAWHUB_TOOLCHAIN_VERSION}" \
            --manifest "${RUNNER_TEMP}/clawhub-bootstrap-artifact/manifest.json" \
