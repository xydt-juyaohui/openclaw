name: OpenClaw Live And E2E Checks (Reusable)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Ref, tag, or SHA to validate
        required: true
        type: string
      include_repo_e2e:
        description: Whether to run pnpm test:e2e plus repo-specific extra E2E lanes
        required: false
        default: true
        type: boolean
      include_release_path_suites:
        description: Whether to run the Docker release-path suites
        required: false
        default: true
        type: boolean
      include_openwebui:
        description: Whether to run the Open WebUI Docker smoke
        required: false
        default: true
        type: boolean
      docker_lanes:
        description: Comma/space separated Docker scheduler lane names to run against the prepared image
        required: false
        default: ""
        type: string
      targeted_docker_lane_group_size:
        description: Number of targeted Docker lanes to batch into one runner job
        required: false
        default: 1
        type: number
      published_upgrade_survivor_baseline:
        description: Published OpenClaw package baseline for the published-upgrade-survivor/update-migration Docker lanes
        required: false
        default: openclaw@latest
        type: string
      published_upgrade_survivor_baselines:
        description: Optional exact baseline list for published-upgrade-survivor/update-migration lane expansion
        required: false
        default: ""
        type: string
      published_upgrade_survivor_scenarios:
        description: Optional scenario list for published-upgrade-survivor/update-migration lane expansion
        required: false
        default: ""
        type: string
      allow_frozen_target_scenario_omissions:
        description: Trusted opt-in to omit survivor scenarios absent from a canonical frozen target
        required: false
        default: false
        type: boolean
      shared_image_policy:
        description: Shared Docker image transport
        required: true
        default: no-push-artifact
        type: choice
        options:
          - existing-only
          - no-push-artifact
      shared_image_artifact_namespace:
        description: Safe unique artifact namespace when shared_image_policy=no-push-artifact
        required: false
        default: direct
        type: string
      docker_e2e_bare_image:
        description: Existing bare Docker E2E image to reuse; blank derives from package SHA/ref
        required: false
        default: ""
        type: string
      docker_e2e_functional_image:
        description: Existing functional Docker E2E image to reuse; blank derives from package SHA/ref
        required: false
        default: ""
        type: string
      codex_plugin_spec:
        description: Optional Codex plugin install spec for the live package lane; blank packs extensions/codex from the selected ref
        required: false
        default: ""
        type: string
      include_live_suites:
        description: Whether to run live-provider coverage
        required: false
        default: true
        type: boolean
      live_models_only:
        description: Whether to run only the Docker live model matrix when live suites are enabled
        required: false
        default: false
        type: boolean
      live_model_providers:
        description: Comma/space separated provider ids for the Docker live model matrix; blank runs all providers
        required: false
        default: ""
        type: string
      live_suite_filter:
        description: Optional exact live suite id to run for focused failed-shard recovery; blank runs all selected suites
        required: false
        default: ""
        type: string
      release_test_profile:
        description: Release coverage profile for live/Docker/provider breadth
        required: false
        default: stable
        type: choice
        options:
          - beta
          - stable
          - full
      use_github_hosted_runners:
        description: Use GitHub-hosted runners where supported; OpenWebUI always uses a large-disk Blacksmith runner
        required: false
        default: false
        type: boolean
      advisory:
        description: Treat failures as advisory for the caller
        required: false
        default: false
        type: boolean
      live_advisory:
        description: Treat only live-provider suite failures as advisory for the caller; repo and Docker E2E stay blocking
        required: false
        default: false
        type: boolean
      allow_unreleased_changelog:
        description: Allow current-tree QA packaging to use Unreleased notes when no exact version section exists
        required: false
        default: false
        type: boolean
  workflow_call:
    outputs:
      candidate_artifact_json:
        description: Immutable package and Docker image artifact tuple
        value: ${{ jobs.prepare_docker_e2e_image.outputs.candidate_artifact_json }}
      package_artifact_name:
        description: Immutable package artifact name
        value: ${{ jobs.prepare_docker_e2e_image.outputs.package_artifact_name }}
      package_artifact_id:
        description: Immutable package artifact id
        value: ${{ jobs.prepare_docker_e2e_image.outputs.package_artifact_id }}
      package_artifact_digest:
        description: Package artifact service digest
        value: ${{ jobs.prepare_docker_e2e_image.outputs.package_artifact_digest }}
      package_artifact_run_id:
        description: Package artifact producer run id
        value: ${{ jobs.prepare_docker_e2e_image.outputs.package_artifact_run_id }}
      package_artifact_run_attempt:
        description: Package artifact producer run attempt
        value: ${{ jobs.prepare_docker_e2e_image.outputs.package_artifact_run_attempt }}
      package_file_name:
        description: Package tarball filename
        value: ${{ jobs.prepare_docker_e2e_image.outputs.package_file_name }}
      package_source_sha:
        description: Package source commit
        value: ${{ jobs.prepare_docker_e2e_image.outputs.package_source_sha }}
      package_sha256:
        description: Package tarball SHA-256
        value: ${{ jobs.prepare_docker_e2e_image.outputs.package_sha256 }}
      package_version:
        description: Package version
        value: ${{ jobs.prepare_docker_e2e_image.outputs.package_version }}
      shared_image_artifact_name:
        description: Immutable Docker image artifact name
        value: ${{ jobs.prepare_docker_e2e_image.outputs.image_artifact_name }}
      shared_image_artifact_id:
        description: Immutable Docker image artifact id
        value: ${{ jobs.prepare_docker_e2e_image.outputs.image_artifact_id }}
      shared_image_artifact_digest:
        description: Docker image artifact service digest
        value: ${{ jobs.prepare_docker_e2e_image.outputs.image_artifact_digest }}
      shared_image_artifact_run_id:
        description: Docker image artifact producer run id
        value: ${{ jobs.prepare_docker_e2e_image.outputs.image_artifact_run_id }}
      shared_image_artifact_run_attempt:
        description: Docker image artifact producer run attempt
        value: ${{ jobs.prepare_docker_e2e_image.outputs.image_artifact_run_attempt }}
      shared_image_archive_sha256:
        description: Docker image archive SHA-256
        value: ${{ jobs.prepare_docker_e2e_image.outputs.image_archive_sha256 }}
    inputs:
      advisory:
        description: Treat failures as advisory for the caller
        required: false
        default: false
        type: boolean
      live_advisory:
        description: Treat only live-provider suite failures as advisory for the caller; repo and Docker E2E stay blocking
        required: false
        default: false
        type: boolean
      allow_unreleased_changelog:
        description: Allow current-tree QA packaging to use Unreleased notes when no exact version section exists
        required: false
        default: false
        type: boolean
      prepare_only:
        description: Prepare immutable package and Docker image artifacts without running validation lanes
        required: false
        default: false
        type: boolean
      ref:
        description: Ref, tag, or SHA to validate
        required: true
        type: string
      include_repo_e2e:
        description: Whether to run pnpm test:e2e
        required: false
        default: false
        type: boolean
      include_release_path_suites:
        description: Whether to run the Docker release-path suites
        required: false
        default: false
        type: boolean
      include_openwebui:
        description: Whether to run the Open WebUI Docker smoke
        required: false
        default: true
        type: boolean
      docker_lanes:
        description: Comma/space separated Docker scheduler lane names to run against the prepared image
        required: false
        default: ""
        type: string
      targeted_docker_lane_group_size:
        description: Number of targeted Docker lanes to batch into one runner job
        required: false
        default: 1
        type: number
      published_upgrade_survivor_baseline:
        description: Published OpenClaw package baseline for the published-upgrade-survivor/update-restart-auth/update-migration Docker lanes
        required: false
        default: openclaw@latest
        type: string
      published_upgrade_survivor_baselines:
        description: Optional exact baseline list for published-upgrade-survivor/update-migration lane expansion
        required: false
        default: ""
        type: string
      published_upgrade_survivor_scenarios:
        description: Optional scenario list for published-upgrade-survivor/update-migration lane expansion
        required: false
        default: ""
        type: string
      allow_frozen_target_scenario_omissions:
        description: Trusted opt-in to omit survivor scenarios absent from a canonical frozen target
        required: false
        default: false
        type: boolean
      package_artifact_name:
        description: Existing workflow artifact containing openclaw-current.tgz; blank packs the selected ref
        required: false
        default: ""
        type: string
      package_artifact_id:
        description: Immutable GitHub artifact id for package_artifact_name
        required: false
        default: ""
        type: string
      package_artifact_digest:
        description: GitHub artifact service SHA-256 digest without the sha256 prefix
        required: false
        default: ""
        type: string
      package_artifact_run_id:
        description: Producer run id containing package_artifact_name
        required: false
        default: ""
        type: string
      package_artifact_run_attempt:
        description: Producer run attempt containing package_artifact_name
        required: false
        default: ""
        type: string
      package_file_name:
        description: Exact package tarball filename inside package_artifact_name
        required: false
        default: ""
        type: string
      package_source_sha:
        description: Exact source commit recorded in the package tarball
        required: false
        default: ""
        type: string
      package_sha256:
        description: Exact root OpenClaw package SHA-256 for no-push image artifacts
        required: false
        default: ""
        type: string
      package_version:
        description: Exact OpenClaw package version for no-push image artifacts
        required: false
        default: ""
        type: string
      shared_image_policy:
        description: "Shared Docker image transport: existing-only or no-push-artifact"
        required: false
        default: no-push-artifact
        type: string
      shared_image_artifact_namespace:
        description: Safe unique artifact namespace when shared_image_policy=no-push-artifact
        required: false
        default: direct
        type: string
      shared_image_artifact_name:
        description: Existing immutable Docker image artifact name
        required: false
        default: ""
        type: string
      shared_image_artifact_id:
        description: Existing immutable Docker image artifact id
        required: false
        default: ""
        type: string
      shared_image_artifact_digest:
        description: Existing Docker image artifact service SHA-256 digest
        required: false
        default: ""
        type: string
      shared_image_artifact_run_id:
        description: Producer run id for the Docker image artifact
        required: false
        default: ""
        type: string
      shared_image_artifact_run_attempt:
        description: Producer run attempt for the Docker image artifact
        required: false
        default: ""
        type: string
      shared_image_archive_sha256:
        description: SHA-256 of the Docker image archive inside the artifact
        required: false
        default: ""
        type: string
      docker_e2e_bare_image:
        description: Existing bare Docker E2E image to reuse; blank derives from package SHA/ref
        required: false
        default: ""
        type: string
      docker_e2e_functional_image:
        description: Existing functional Docker E2E image to reuse; blank derives from package SHA/ref
        required: false
        default: ""
        type: string
      codex_plugin_spec:
        description: Optional Codex plugin install spec for the live package lane; blank packs extensions/codex from the selected ref
        required: false
        default: ""
        type: string
      include_live_suites:
        description: Whether to run live-provider coverage
        required: false
        default: true
        type: boolean
      live_models_only:
        description: Whether to run only the Docker live model matrix when live suites are enabled
        required: false
        default: false
        type: boolean
      live_model_providers:
        description: Comma/space separated provider ids for the Docker live model matrix; blank runs all providers
        required: false
        default: ""
        type: string
      live_suite_filter:
        description: Optional exact live suite id to run for focused failed-shard recovery; blank runs all selected suites
        required: false
        default: ""
        type: string
      release_test_profile:
        description: Release coverage profile for live/Docker/provider breadth
        required: false
        default: stable
        type: string
      use_github_hosted_runners:
        description: Use GitHub-hosted runners where supported; OpenWebUI always uses a large-disk Blacksmith runner
        required: false
        default: true
        type: boolean
    secrets:
      OPENAI_API_KEY:
        required: false
      OPENAI_BASE_URL:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      ANTHROPIC_API_KEY_OLD:
        required: false
      ANTHROPIC_API_TOKEN:
        required: false
      FACTORY_API_KEY:
        required: false
      BYTEPLUS_API_KEY:
        required: false
      CEREBRAS_API_KEY:
        required: false
      DEEPINFRA_API_KEY:
        required: false
      DASHSCOPE_API_KEY:
        required: false
      GROQ_API_KEY:
        required: false
      KIMI_API_KEY:
        required: false
      MODELSTUDIO_API_KEY:
        required: false
      MOONSHOT_API_KEY:
        required: false
      MISTRAL_API_KEY:
        required: false
      MINIMAX_API_KEY:
        required: false
      OPENCODE_API_KEY:
        required: false
      OPENCODE_ZEN_API_KEY:
        required: false
      OPENCLAW_LIVE_BROWSER_CDP_URL:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN_MODEL:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN_PROFILE:
        required: false
      OPENCLAW_LIVE_SETUP_TOKEN_VALUE:
        required: false
      GEMINI_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false
      QWEN_API_KEY:
        required: false
      FAL_KEY:
        required: false
      RUNWAY_API_KEY:
        required: false
      DEEPGRAM_API_KEY:
        required: false
      TOGETHER_API_KEY:
        required: false
      VYDRA_API_KEY:
        required: false
      XAI_API_KEY:
        required: false
      ZAI_API_KEY:
        required: false
      Z_AI_API_KEY:
        required: false
      BYTEPLUS_ACCESS_KEY_ID:
        required: false
      BYTEPLUS_SECRET_ACCESS_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      OPENCLAW_CODEX_AUTH_JSON:
        required: false
      OPENCLAW_CODEX_CONFIG_TOML:
        required: false
