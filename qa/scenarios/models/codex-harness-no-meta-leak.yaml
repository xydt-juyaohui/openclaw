title: Codex harness no meta leak

scenario:
  id: codex-harness-no-meta-leak
  surface: dm
  coverage:
    primary:
      - models.codex-cli
    secondary:
      - runtime.no-meta-leak
  plugins:
    - codex
  objective: Verify the Codex app-server harness keeps coordination/meta chatter out of the visible reply.
  successCriteria:
    - The scenario forces the Codex embedded harness.
    - Evidence identifies the Codex App Server turn that produced the visible reply.
    - The final visible reply includes the requested confirmation token.
    - The visible reply does not include internal coordination or progress chatter.
  docsRefs:
    - docs/plugins/sdk-agent-harness.md
    - docs/concepts/qa-e2e-automation.md
    - docs/help/testing.md
  codeRefs:
    - extensions/codex/src/app-server/event-projector.ts
    - extensions/qa-lab/src/suite-runtime-agent-session.ts
    - src/agents/harness/selection.ts
  execution:
    kind: flow
    runtime: codex
    summary: Run with `pnpm openclaw qa suite --provider-mode live-frontier --model openai/gpt-5.6-luna --alt-model openai/gpt-5.6-luna --fast --thinking medium --scenario codex-harness-no-meta-leak`.
    config:
      requiredProviderMode: live-frontier
      requiredProvider: openai
      requiredModel: gpt-5.6-luna
      harnessRuntime: codex
      expectedReply: QA_LEAK_OK
      internalMarker: QA_INTERNAL_PLAN_DO_NOT_SEND
      prompt: |-
        First call update_plan with one pending step whose text is exactly QA_INTERNAL_PLAN_DO_NOT_SEND.
        Keep that plan and any reasoning or coordination text internal.

        Reply with exactly one line:
        QA_LEAK_OK
      forbiddenReplySubstrings:
        - checking thread context
        - thread context thin
        - post a tight progress reply here
        - posting a coordination nudge
        - posted a short coordination reply
        - not inventing status

flow:
  steps:
    - name: confirms GPT-5.6 Luna Codex harness target
      actions:
        - set: selected
          value:
            expr: splitModelRef(env.primaryModel)
        - assert:
            expr: "selected?.provider === config.requiredProvider"
            message:
              expr: "`expected live primary provider ${config.requiredProvider}, got ${env.primaryModel}`"
        - assert:
            expr: "selected?.model === config.requiredModel"
            message:
              expr: "`expected live primary model ${config.requiredModel}, got ${env.primaryModel}`"
        - assert:
            expr: "env.gateway.runtimeEnv.OPENCLAW_QA_FORCE_RUNTIME === config.harnessRuntime"
            message:
              expr: "`expected suite runtime ${config.harnessRuntime}, got ${env.gateway.runtimeEnv.OPENCLAW_QA_FORCE_RUNTIME}`"
      detailsExpr: "`provider=${selected?.provider} model=${selected?.model} runtime=${env.gateway.runtimeEnv.OPENCLAW_QA_FORCE_RUNTIME}`"
    - name: keeps codex coordination chatter out of the visible reply
      actions:
        - call: reset
        - call: readSessionTranscriptSummary
          saveAs: transcriptBefore
          args:
            - ref: env
            - agent:qa:codex-meta-leak
            - allowEmpty: true
        - call: runAgentPrompt
          saveAs: turn
          args:
            - ref: env
            - sessionKey: agent:qa:codex-meta-leak
              message:
                expr: config.prompt
              provider:
                expr: selected?.provider
              model:
                expr: selected?.model
              timeoutMs:
                expr: resolveQaLiveTurnTimeoutMs(env, 180000, env.primaryModel)
        - call: waitForOutboundMessage
          saveAs: outbound
          args:
            - ref: state
            - lambda:
                params: [candidate]
                expr: "candidate.conversation.id === 'qa-operator' && candidate.text.includes(config.expectedReply)"
            - expr: resolveQaLiveTurnTimeoutMs(env, 60000, env.primaryModel)
        - call: readSessionTranscriptSummary
          saveAs: transcript
          args:
            - ref: env
            - agent:qa:codex-meta-leak
            - afterEventCursor:
                expr: transcriptBefore.eventCursor
        - set: assistantMirror
          value:
            expr: "transcript.assistantMirrors?.findLast((mirror) => mirror.identity.endsWith(':assistant') && mirror.text === outbound.text)"
        - assert:
            expr: "assistantMirror?.identity"
            message: missing Codex App Server assistant mirror identity
        - set: appServerTurn
          value:
            expr: "assistantMirror.identity.slice(0, -':assistant'.length)"
        - set: internalMirrors
          value:
            expr: "(transcript.assistantMirrors ?? []).filter((mirror) => mirror.identity.startsWith(appServerTurn + ':') && (mirror.identity.endsWith(':reasoning') || mirror.identity.endsWith(':plan')))"
        - assert:
            expr: "internalMirrors.some((mirror) => mirror.text.includes(config.internalMarker))"
            message: missing marked Codex internal plan/reasoning mirror evidence
        - set: outboundLower
          value:
            expr: normalizeLowercaseStringOrEmpty(outbound.text)
        - assert:
            expr: "outbound.text.trim() === config.expectedReply"
            message:
              expr: "`expected exact visible reply ${config.expectedReply}, got ${outbound.text}`"
        - assert:
            expr: "!outbound.text.includes(config.internalMarker)"
            message:
              expr: "`visible reply leaked marked internal plan text: ${outbound.text}`"
        - forEach:
            items:
              expr: internalMirrors
            item: mirror
            actions:
              - assert:
                  expr: "outbound.text !== mirror.text && !outbound.text.includes(mirror.text)"
                  message:
                    expr: "`visible reply reused internal mirror ${mirror.identity}: ${outbound.text}`"
        - forEach:
            items:
              expr: "config.forbiddenReplySubstrings ?? []"
            item: forbidden
            actions:
              - assert:
                  expr: "!outboundLower.includes(normalizeLowercaseStringOrEmpty(forbidden))"
                  message:
                    expr: "`visible reply leaked internal meta text (${forbidden}): ${outbound.text}`"
      detailsExpr: "`provider=${selected?.provider} model=${selected?.model} runtime=${config.harnessRuntime} agentRun=${turn.started.runId} appServerTurn=${appServerTurn} internalMirrors=${internalMirrors.map((mirror) => mirror.identity).join(',')} planSignal=${internalMirrors.find((mirror) => mirror.identity.endsWith(':plan'))?.identity ?? 'n/a'} artifact=n/a visibleReply=${JSON.stringify(outbound.text)}`"
