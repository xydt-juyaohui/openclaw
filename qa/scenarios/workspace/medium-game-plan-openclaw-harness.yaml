title: Medium game plan OpenClaw harness

scenario:
  id: medium-game-plan-openclaw-harness
  surface: workspace
  coverage:
    primary:
      - workspace.planning
    secondary:
      - agents.openclaw-harness
  objective: Verify GPT-5.6 Luna can use the OpenClaw harness to plan and build a medium-complex self-contained browser game.
  successCriteria:
    - A live-frontier run fails fast unless the selected primary model is openai/gpt-5.6-luna.
    - The scenario forces the embedded OpenClaw harness before the build turn.
    - The OpenClaw harness records a successful `update_plan` tool call before the artifact assertion passes.
    - The agent writes a self-contained HTML game with a canvas loop, controls, scoring, waves, pause, and restart.
  docsRefs:
    - docs/plugins/sdk-agent-harness.md
    - docs/gateway/configuration-reference.md
    - docs/help/testing.md
  codeRefs:
    - src/agents/harness/selection.ts
    - src/agents/harness/builtin-openclaw.ts
    - extensions/qa-lab/src/suite-runtime-agent-session.ts
  execution:
    kind: flow
    runtime: openclaw
    summary: Run with `pnpm openclaw qa suite --provider-mode live-frontier --model openai/gpt-5.6-luna --alt-model openai/gpt-5.6-luna --fast --thinking medium --scenario medium-game-plan-openclaw-harness`.
    config:
      requiredProviderMode: live-frontier
      requiredProvider: openai
      requiredModel: gpt-5.6-luna
      harnessRuntime: openclaw
      artifactFile: star-garden-defenders-openclaw.html
      gameTitle: Star Garden Defenders
      minBytes: 5000
      buildPrompt: |-
        Call update_plan with a short implementation plan before editing.

        Then build a medium-complex, self-contained browser game at ./star-garden-defenders-openclaw.html.

        Game: Star Garden Defenders.
        Requirements:
        - one HTML file only; no external assets, fonts, scripts, or network calls
        - canvas-based arcade loop with requestAnimationFrame
        - keyboard controls and mouse or pointer support
        - player movement, enemy waves, collectibles or power-ups, collision handling
        - score, lives or health, wave number, pause, and game-over state
        - a visible Restart control wired to a restartGame function
        - polished inline CSS and clear on-screen controls
        - after writing the file, reply with the filename and the main systems implemented

flow:
  steps:
    - name: confirms GPT-5.6 Luna OpenClaw harness target
      actions:
        - set: selected
          value:
            expr: splitModelRef(env.primaryModel)
        - assert:
            expr: "selected?.provider === config.requiredProvider"
            message:
              expr: "`expected live primary provider ${config.requiredProvider}, got ${env.primaryModel}`"
        - assert:
            expr: "selected?.model === config.requiredModel"
            message:
              expr: "`expected live primary model ${config.requiredModel}, got ${env.primaryModel}`"
        - assert:
            expr: "env.gateway.runtimeEnv.OPENCLAW_QA_FORCE_RUNTIME === config.harnessRuntime"
            message:
              expr: "`expected suite runtime ${config.harnessRuntime}, got ${env.gateway.runtimeEnv.OPENCLAW_QA_FORCE_RUNTIME}`"
      detailsExpr: "`provider=${selected?.provider} model=${selected?.model} runtime=${env.gateway.runtimeEnv.OPENCLAW_QA_FORCE_RUNTIME}`"
    - name: builds the medium game artifact
      actions:
        - call: reset
        - call: readSessionTranscriptSummary
          saveAs: transcriptBefore
          args:
            - ref: env
            - agent:qa:medium-game-openclaw
            - allowEmpty: true
        - call: runAgentPrompt
          saveAs: turn
          args:
            - ref: env
            - sessionKey: agent:qa:medium-game-openclaw
              message:
                expr: config.buildPrompt
              provider:
                expr: selected?.provider
              model:
                expr: selected?.model
              timeoutMs:
                expr: resolveQaLiveTurnTimeoutMs(env, 420000, env.primaryModel)
        - call: waitForOutboundMessage
          saveAs: outbound
          args:
            - ref: state
            - lambda:
                params: [candidate]
                expr: "candidate.conversation.id === 'qa-operator' && candidate.text.includes(config.artifactFile)"
            - expr: resolveQaLiveTurnTimeoutMs(env, 60000, env.primaryModel)
        - call: readSessionTranscriptSummary
          saveAs: transcript
          args:
            - ref: env
            - agent:qa:medium-game-openclaw
            - afterEventCursor:
                expr: transcriptBefore.eventCursor
        - assert:
            expr: "(transcript.successfulToolCallCounts.update_plan ?? 0) > 0"
            message: missing OpenClaw update_plan signal
        - set: artifactPath
          value:
            expr: "path.join(env.gateway.workspaceDir, config.artifactFile)"
        - call: waitForCondition
          saveAs: artifact
          args:
            - lambda:
                async: true
                expr: "((await fs.readFile(artifactPath, 'utf8').catch(() => '')).includes(config.gameTitle) ? await fs.readFile(artifactPath, 'utf8').catch(() => '') : undefined)"
            - expr: resolveQaLiveTurnTimeoutMs(env, 60000, env.primaryModel)
            - 500
        - set: artifactLower
          value:
            expr: normalizeLowercaseStringOrEmpty(artifact)
        - assert:
            expr: "artifact.length >= config.minBytes"
            message:
              expr: "`expected medium game artifact >= ${config.minBytes} bytes, got ${artifact.length}`"
        - assert:
            expr: "artifactLower.includes('star garden defenders') && artifactLower.includes('<canvas') && artifactLower.includes('requestanimationframe')"
            message: missing title, canvas, or animation loop
        - assert:
            expr: "artifactLower.includes('keydown') || artifactLower.includes('keyup')"
            message: missing keyboard controls
        - assert:
            expr: "artifactLower.includes('score')"
            message: missing score system
        - assert:
            expr: "artifactLower.includes('wave')"
            message: missing wave system
        - assert:
            expr: "artifactLower.includes('pause')"
            message: missing pause system
        - assert:
            expr: "artifactLower.includes('restart') || artifactLower.includes('resetgame')"
            message: missing restart system
        - assert:
            expr: "outbound.text.includes(config.artifactFile)"
            message:
              expr: "`final reply did not mention ${config.artifactFile}: ${outbound.text}`"
      detailsExpr: "`provider=${selected?.provider} model=${selected?.model} runtime=${config.harnessRuntime} agentRun=${turn.started.runId} appServerTurn=n/a planSignal=update_plan:success:${transcript.successfulToolCallCounts.update_plan ?? 0} artifact=${artifactPath} bytes=${artifact.length} visibleReply=${JSON.stringify(outbound.text)}`"
