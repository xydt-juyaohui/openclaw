title: Matrix streaming can opt out of preview tool progress
scenario:
  id: matrix-room-tool-progress-preview-opt-out
  surface: channels
  coverage:
    primary:
      - channels.streaming
  execution:
    profiles: { "matrix:all": 11, "matrix:transport": 10 }
    kind: flow
    channel: matrix
    timeoutMs: 60000
    retryCount: 0
    config:
      matrixConfigOverrides:
        streaming:
          mode: quiet
          preview:
            toolProgress: false
        toolProfile: coding

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-room.js
  call: runToolProgressPreviewOptOutScenario
  args:
    - expr: "scenarioContext"
