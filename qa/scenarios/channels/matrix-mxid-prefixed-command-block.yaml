title: Matrix MXID-prefixed control command gating
scenario:
  id: matrix-mxid-prefixed-command-block
  surface: channels
  coverage:
    primary:
      - channels.native-commands
    secondary:
      - channels.group-messages
  execution:
    profiles: { "matrix:all": 44, "matrix:transport": 43 }
    kind: flow
    channel: matrix
    timeoutMs: 8000
    retryCount: 0
    config:
      matrixConfigOverrides:
        groupPolicy: open

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-policy.js
  call: runMxidPrefixedCommandBlockScenario
  args:
    - expr: "scenarioContext"
