title: Matrix partial streaming preview
scenario:
  id: matrix-room-partial-streaming-preview
  surface: channels
  coverage:
    primary:
      - channels.streaming
  docsRefs:
    - docs/concepts/streaming.md
  execution:
    profiles: { "matrix:all": 7, "matrix:transport": 6 }
    kind: flow
    channel: matrix
    timeoutMs: 45000
    retryCount: 0
    config:
      matrixConfigOverrides:
        streaming: partial

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-room.js
  call: runPartialStreamingPreviewScenario
  args:
    - expr: "scenarioContext"
