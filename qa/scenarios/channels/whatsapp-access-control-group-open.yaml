title: WhatsApp groupPolicy open allows mention-gated groups

scenario:
  id: whatsapp-access-control-group-open
  surface: channels
  coverage:
    primary:
      - channels.access-policy
  objective: Verify groupPolicy open accepts a mentioned group message.
  gatewayConfigPatch:
    channels:
      whatsapp:
        accounts:
          $selectedAccount:
            groupPolicy: open
  successCriteria:
    - The mentioned group message receives one marker reply.
  docsRefs:
    - docs/channels/whatsapp.md
  codeRefs:
    - extensions/whatsapp/src/monitor.ts
  execution:
    kind: flow
    channel: whatsapp
    suiteIsolation: isolated
    summary: Verify WhatsApp groupPolicy open behavior through the canonical adapter.
    config:
      conversationKind: group
      conversationId: 120363000000000000@g.us
      senderId: 15550000002@s.whatsapp.net
      mentionPrefix: "openclawqa "
      expectReply: true
      markerPrefix: WHATSAPP_QA_GROUP_OPEN
      timeoutMs: 60000

flow:
  steps:
    - name: enforces configured access policy
      actions:
        - call: waitForGatewayHealthy
          args: [{ ref: env }, 60000]
        - call: waitForTransportReady
          args: [{ ref: env }, 60000]
        - resetTransport: true
        - set: marker
          value:
            expr: "`${config.markerPrefix}_${randomUUID().slice(0, 8).toUpperCase()}`"
        - set: outboundCount
          value:
            expr: "getTransportSnapshot().messages.filter((message) => message.direction === 'outbound').length"
        - sendInbound:
            conversation:
              id: { ref: config.conversationId }
              kind: { ref: config.conversationKind }
            senderId: { ref: config.senderId }
            senderName: QA Driver
            text:
              expr: "`${config.mentionPrefix}Reply with only this exact marker: ${marker}`"
        - if:
            expr: config.expectReply
            then:
              - waitForOutbound:
                  textIncludes: { ref: marker }
                  timeoutMs: { ref: config.timeoutMs }
            else:
              - waitForNoOutbound:
                  quietMs: { ref: config.timeoutMs }
                  sinceIndex: { ref: outboundCount }
      detailsExpr: "`${config.markerPrefix}: expectReply=${config.expectReply}`"
