title: Matrix allowBots=mentions blocks unmentioned configured bot messages in open rooms
scenario:
  id: matrix-allowbots-mentions-unmentioned-open-room-block
  surface: channels
  coverage:
    primary:
      - channels.access-policy
  execution:
    profiles: { "matrix:all": 39, "matrix:transport": 38 }
    kind: flow
    channel: matrix
    timeoutMs: 8000
    retryCount: 0
    config:
      matrixConfigOverrides:
        allowBots: mentions
        configuredBotRoles:
          - observer
        groupAllowRoles:
          - driver
          - observer
        groupsByKey:
          main:
            requireMention: false

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-allowbots.js
  call: runAllowBotsMentionsUnmentionedOpenRoomBlockScenario
  args:
    - expr: "scenarioContext"
