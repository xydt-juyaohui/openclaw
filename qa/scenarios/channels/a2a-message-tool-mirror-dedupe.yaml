title: A2A message-tool mirror dedupe

scenario:
  id: a2a-message-tool-mirror-dedupe
  surface: channel
  coverage:
    primary:
      - runtime.delivery
    secondary:
      - channels.qa-channel
      - tools.message
  objective: Verify a sessions_send A2A turn whose nested target run replies through message(action=send) delivers once to the requester channel and does not re-announce the delivery-mirror transcript row.
  gatewayConfigPatch:
    messages:
      groupChat:
        visibleReplies: message_tool
    session:
      agentToAgent:
        maxPingPongTurns: 0
    tools:
      sessions:
        visibility: all
      agentToAgent:
        enabled: true
  successCriteria:
    - Source agent receives a synthetic qa-channel group turn.
    - Source agent calls sessions_send against its real qa-channel group session.
    - Target run calls message(action=send) under the source-reply path.
    - The requester group sees the marker exactly once, with no duplicate during the post-delivery window.
  docsRefs:
    - docs/channels/qa-channel.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - src/agents/tools/sessions-send-tool.ts
    - src/agents/tools/sessions-send-tool.a2a.ts
    - src/agents/run-wait.ts
    - src/shared/transcript-only-openclaw-assistant.ts
  execution:
    kind: flow
    channel: qa-channel
    summary: Run a real QA Gateway/qa-channel A2A source-reply turn and assert the message-tool delivery mirror is not announced again.
    config:
      requiredProviderMode: mock-openai
      conversationId: qa-a2a-mirror-room
      conversationTitle: QA A2A Mirror Room
      promptSnippet: qa a2a message-tool mirror check
      targetPromptSnippet: qa group visible reply tool check
      expectedMarker: QA-A2A-MESSAGE-TOOL-MIRROR-OK
      duplicateWindowMs: 8000

flow:
  steps:
    - name: delivers target message-tool reply once without mirror re-announce
      actions:
        - assert:
            expr: "env.providerMode === config.requiredProviderMode"
            message: this seeded scenario is mock-openai only
        - call: waitForGatewayHealthy
          args:
            - ref: env
            - 60000
        - call: waitForQaChannelReady
          args:
            - ref: env
            - 60000
        - call: reset
        - set: startIndex
          value:
            expr: state.getSnapshot().messages.length
        - set: targetSessionKey
          value:
            expr: "buildAgentSessionKey({ agentId: 'qa', channel: 'qa-channel', accountId: 'default', peer: { kind: 'group', id: `group:${config.conversationId}` }, dmScope: env.cfg.session?.dmScope, identityLinks: env.cfg.session?.identityLinks })"
        - set: requestCursorBefore
          value:
            expr: "env.mock ? (await fetchJson(`${env.mock.baseUrl}/debug/request-cursor`)).cursor : 0"
        - call: state.addInboundMessage
          args:
            - conversation:
                id:
                  expr: config.conversationId
                kind: group
                title:
                  expr: config.conversationTitle
              senderId: alice
              senderName: Alice
              text:
                expr: "`@openclaw ${config.promptSnippet}. sessionKey=\"${targetSessionKey}\". Use sessions_send once with timeoutSeconds=0. The target must reply visibly with exact marker: \\`${config.expectedMarker}\\``"
        - call: waitForCondition
          saveAs: sourceSessionsSendRequest
          args:
            - lambda:
                async: true
                params: []
                expr: "env.mock ? (await fetchJson(`${env.mock.baseUrl}/debug/requests?after=${requestCursorBefore}`)).find((request) => String(request.allInputText ?? '').includes(config.promptSnippet) && request.plannedToolName === 'sessions_send' && request.plannedToolArgs?.sessionKey === targetSessionKey && request.plannedToolArgs?.timeoutSeconds === 0) : true"
            - expr: liveTurnTimeoutMs(env, 60000)
            - 500
        - call: waitForCondition
          saveAs: targetMessageToolRequest
          args:
            - lambda:
                async: true
                params: []
                expr: "env.mock ? (await fetchJson(`${env.mock.baseUrl}/debug/requests?after=${requestCursorBefore}`)).find((request) => String(request.allInputText ?? '').includes(config.targetPromptSnippet) && request.plannedToolName === 'message' && request.plannedToolArgs?.action === 'send' && request.plannedToolArgs?.message === config.expectedMarker) : true"
            - expr: liveTurnTimeoutMs(env, 90000)
            - 500
        - call: waitForOutboundMessage
          saveAs: outbound
          args:
            - ref: state
            - lambda:
                params: [candidate]
                expr: "candidate.conversation.id === config.conversationId && candidate.conversation.kind === 'group' && candidate.direction === 'outbound' && String(candidate.text ?? '').includes(config.expectedMarker)"
            - expr: liveTurnTimeoutMs(env, 90000)
            - sinceIndex:
                ref: startIndex
        - call: sleep
          args:
            - expr: config.duplicateWindowMs
        - set: snapshot
          value:
            expr: state.getSnapshot()
        - set: matchingOutbound
          value:
            expr: "snapshot.messages.slice(startIndex).filter((message) => message.direction === 'outbound' && message.conversation.id === config.conversationId && message.conversation.kind === 'group' && String(message.text ?? '').includes(config.expectedMarker))"
        - assert:
            expr: matchingOutbound.length === 1
            message:
              expr: "`expected exactly one requester-visible A2A marker after duplicate window, saw ${matchingOutbound.length}; transcript=${formatTransportTranscript(state, { conversationId: config.conversationId })}`"
        - set: scenarioRequests
          value:
            expr: "env.mock ? (await fetchJson(`${env.mock.baseUrl}/debug/requests?after=${requestCursorBefore}`)).map((request) => ({ prompt: String(request.prompt ?? '').slice(0, 220), plannedToolName: request.plannedToolName ?? null, plannedToolArgs: request.plannedToolArgs ?? null, toolOutput: request.toolOutput ? String(request.toolOutput).slice(0, 220) : null })) : []"
        - assert:
            expr: "!env.mock || scenarioRequests.filter((request) => request.plannedToolName === 'sessions_send' && request.plannedToolArgs?.sessionKey === targetSessionKey && request.plannedToolArgs?.timeoutSeconds === 0).length === 1"
            message:
              expr: "`expected exactly one source sessions_send plan for the target session; requests=${JSON.stringify(scenarioRequests)}`"
        - assert:
            expr: "!env.mock || scenarioRequests.filter((request) => request.plannedToolName === 'message' && request.plannedToolArgs?.action === 'send' && request.plannedToolArgs?.message === config.expectedMarker).length === 1"
            message:
              expr: "`expected exactly one target message(action=send) plan for the marker; requests=${JSON.stringify(scenarioRequests)}`"
      detailsExpr: "`outbound=${outbound.conversation.kind}:${outbound.conversation.id}:${outbound.text}; sourceTool=${JSON.stringify(sourceSessionsSendRequest?.plannedToolArgs ?? {})}; targetTool=${JSON.stringify(targetMessageToolRequest?.plannedToolArgs ?? {})}; duplicateWindowMs=${config.duplicateWindowMs}`"
