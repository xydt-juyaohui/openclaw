title: Matrix E2EE CLI encryption setup rejects an invalid recovery key
scenario:
  id: matrix-e2ee-cli-recovery-key-invalid
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  execution:
    profiles: { "matrix:all": 89, "matrix:e2ee-cli": 5 }
    kind: flow
    channel: matrix
    timeoutMs: 120000
    retryCount: 0
    config:
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-cli-recovery-key-invalid
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE CLI Invalid Recovery Key Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee-cli-recovery.js
  call: runMatrixQaE2eeCliRecoveryKeyInvalidScenario
  args:
    - expr: "scenarioContext"
