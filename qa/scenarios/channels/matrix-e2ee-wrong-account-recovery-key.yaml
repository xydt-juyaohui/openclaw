title: Matrix E2EE rejects a recovery key from a different account
scenario:
  id: matrix-e2ee-wrong-account-recovery-key
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  execution:
    profiles: { "matrix:all": 83, "matrix:e2ee-deep": 17 }
    kind: flow
    channel: matrix
    timeoutMs: 180000
    retryCount: 0
    config:
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-wrong-account-recovery-key
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Wrong Account Key Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee-destructive.js
  call: runMatrixQaE2eeWrongAccountRecoveryKeyScenario
  args:
    - expr: "scenarioContext"
