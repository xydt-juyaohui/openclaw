title: Matrix allowBots=mentions accepts unmentioned configured bot DMs
scenario:
  id: matrix-allowbots-mentions-dm-unmentioned
  surface: channels
  coverage:
    primary:
      - channels.dm
  execution:
    profiles: { "matrix:all": 40, "matrix:transport": 39 }
    kind: flow
    channel: matrix
    timeoutMs: 45000
    retryCount: 0
    config:
      matrixConfigOverrides:
        allowBots: mentions
        configuredBotRoles:
          - observer
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - key: bot-dm
            kind: dm
            members:
              - observer
              - sut
            name: Matrix QA Observer/SUT Bot DM

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-allowbots.js
  call: runAllowBotsMentionsDmUnmentionedScenario
  args:
    - expr: "scenarioContext"
