title: Matrix E2EE stale recovery key is rejected after server backup reset
scenario:
  id: matrix-e2ee-stale-recovery-key-after-backup-reset
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  execution:
    profiles: { "matrix:all": 70, "matrix:e2ee-deep": 4 }
    kind: flow
    channel: matrix
    timeoutMs: 180000
    retryCount: 0
    config:
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-stale-recovery-key-after-backup-reset
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Stale Recovery Key Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee-destructive.js
  call: runMatrixQaE2eeStaleRecoveryKeyAfterBackupResetScenario
  args:
    - expr: "scenarioContext"
