title: Matrix E2EE DM verification notices stay scoped and complete SAS
scenario:
  id: matrix-e2ee-dm-sas-verification
  surface: channels
  coverage:
    primary:
      - channels.dm
  execution:
    profiles: { "matrix:all": 81, "matrix:e2ee-deep": 15 }
    kind: flow
    channel: matrix
    timeoutMs: 90000
    retryCount: 0
    config:
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-verification-dm
            kind: dm
            members:
              - driver
              - observer
            name: Matrix QA E2EE Verification DM

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee-verification.js
  call: runMatrixQaE2eeDmSasVerificationScenario
  args:
    - expr: "scenarioContext"
