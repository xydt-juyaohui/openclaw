title: Matrix secondary room open trigger
scenario:
  id: matrix-secondary-room-open-trigger
  surface: channels
  coverage:
    primary:
      - channels.group-messages
  execution:
    profiles: { "matrix:all": 20, "matrix:transport": 19 }
    kind: flow
    channel: matrix
    timeoutMs: 45000
    retryCount: 0
    config:
      matrixConfigOverrides:
        groupsByKey:
          secondary:
            requireMention: false
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: false
            key: secondary
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA Secondary Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-policy.js
  call: runSecondaryRoomOpenTriggerScenario
  args:
    - expr: "scenarioContext"
