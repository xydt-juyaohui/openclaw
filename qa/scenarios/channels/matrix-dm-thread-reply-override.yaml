title: Matrix DM thread reply override
scenario:
  id: matrix-dm-thread-reply-override
  surface: channels
  coverage:
    primary:
      - channels.threads
    secondary:
      - channels.dm
  execution:
    profiles: { "matrix:all": 16, "matrix:transport": 15 }
    kind: flow
    channel: matrix
    timeoutMs: 45000
    retryCount: 0
    config:
      matrixConfigOverrides:
        dm:
          threadReplies: always
        threadReplies: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - key: driver-dm
            kind: dm
            members:
              - driver
              - sut
            name: Matrix QA Driver/SUT DM

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-dm.js
  call: runDmThreadReplyOverrideScenario
  args:
    - expr: "scenarioContext"
