title: QA channel reconnect dedupe

scenario:
  id: qa-channel-reconnect-dedupe
  surface: channel
  coverage:
    primary:
      - channels.reconnect
    secondary:
      - channels.dedup
      - runtime.delivery
  objective: Verify qa-channel resumes after a Gateway restart without replaying consumed inbound events or completed delivery.
  successCriteria:
    - Agent replies once before a reconnect-style readiness cycle.
    - qa-channel reports ready again without replaying prior inbound or outbound delivery.
    - Follow-up delivery produces one new reply without duplicating the first reply.
  docsRefs:
    - docs/channels/qa-channel.md
    - docs/gateway/configuration.md
  codeRefs:
    - extensions/qa-lab/src/qa-channel-transport.ts
    - extensions/qa-lab/src/bus-state.ts
    - extensions/qa-lab/src/suite-runtime-gateway.ts
  execution:
    kind: flow
    suiteIsolation: isolated
    isolationReason: Gateway restart assertions require a dedicated qa-channel bus and state root.
    summary: Verify qa-channel Gateway restart recovery does not replay consumed messages.
    channel: qa-channel
    config:
      firstPrompt: "@openclaw Reconnect dedupe setup marker. Reply exactly: RECONNECT-FIRST-OK"
      secondPrompt: "@openclaw Reconnect dedupe follow-up marker. Reply exactly: RECONNECT-SECOND-OK"
      firstMarker: RECONNECT-FIRST-OK
      secondMarker: RECONNECT-SECOND-OK

flow:
  steps:
    - name: reconnects without replaying prior outbound
      actions:
        - call: waitForGatewayHealthy
          args:
            - ref: env
            - 60000
        - call: waitForQaChannelReady
          args:
            - ref: env
            - 60000
        - call: reset
        - sendInbound:
            conversation:
              id: qa-room
              kind: group
            senderId: qa-driver
            senderName: QA Driver
            text:
              expr: config.firstPrompt
        - waitForOutbound:
            textIncludes:
              ref: config.firstMarker
            timeoutMs:
              expr: liveTurnTimeoutMs(env, 60000)
        - set: beforeRestartMessageIndex
          value:
            expr: state.getSnapshot().messages.length
        - set: beforeRestartOutboundCount
          value:
            expr: "state.getSnapshot().messages.filter((candidate) => candidate.direction === 'outbound').length"
        - set: beforeRestartCursor
          value:
            expr: state.getSnapshot().cursor
        - call: waitForCondition
          args:
            - lambda:
                expr: "state.getAcknowledgedPollCursor(transport.accountId) >= beforeRestartCursor ? true : undefined"
            - 10000
            - 25
        - assert:
            expr: "typeof env.gateway.restartAfterStateMutation === 'function'"
            message: qa gateway child does not expose restartAfterStateMutation
        - call: env.gateway.restartAfterStateMutation
          args:
            - lambda:
                async: true
                params: [ctx]
                expr: Promise.resolve()
        - call: waitForGatewayHealthy
          args:
            - ref: env
            - 60000
        - call: waitForQaChannelReady
          args:
            - ref: env
            - 60000
        - waitForNoOutbound:
            quietMs: 3000
            sinceIndex:
              ref: beforeRestartOutboundCount
        - set: firstMatchesBeforeFollowup
          value:
            expr: "state.getSnapshot().messages.filter((candidate) => candidate.direction === 'outbound' && candidate.conversation.id === 'qa-room')"
        - assert:
            expr: "firstMatchesBeforeFollowup.length === 1 && String(firstMatchesBeforeFollowup[0]?.text ?? '').includes(config.firstMarker)"
            message:
              expr: "`restart should preserve exactly one marked first reply, saw ${firstMatchesBeforeFollowup.length}; transcript=${formatTransportTranscript(state, { conversationId: 'qa-room' })}`"
        - sendInbound:
            conversation:
              id: qa-room
              kind: group
            senderId: qa-driver
            senderName: QA Driver
            text:
              expr: config.secondPrompt
        - waitForOutbound:
            textIncludes:
              ref: config.secondMarker
            timeoutMs:
              expr: liveTurnTimeoutMs(env, 60000)
            sinceIndex:
              ref: beforeRestartOutboundCount
        - set: snapshot
          value:
            expr: state.getSnapshot()
        - set: firstMatches
          value:
            expr: "snapshot.messages.slice(0, beforeRestartMessageIndex).filter((candidate) => candidate.direction === 'outbound' && candidate.conversation.id === 'qa-room' && String(candidate.text ?? '').includes(config.firstMarker))"
        - set: secondMatches
          value:
            expr: "snapshot.messages.slice(beforeRestartMessageIndex).filter((candidate) => candidate.direction === 'outbound' && candidate.conversation.id === 'qa-room' && String(candidate.text ?? '').includes(config.secondMarker))"
        - set: postRestartOutbounds
          value:
            expr: "snapshot.messages.slice(beforeRestartMessageIndex).filter((candidate) => candidate.direction === 'outbound' && candidate.conversation.id === 'qa-room')"
        - assert:
            expr: "firstMatches.length === 1 && secondMatches.length === 1 && postRestartOutbounds.length === 1 && !postRestartOutbounds.some((candidate) => String(candidate.text ?? '').includes(config.firstMarker))"
            message:
              expr: "`expected one marked pre-restart reply and exactly one marked post-restart reply without replaying the first marker; first=${firstMatches.length} second=${secondMatches.length} post=${postRestartOutbounds.length}; transcript=${formatTransportTranscript(state, { conversationId: 'qa-room' })}`"
      detailsExpr: "`before=${config.firstMarker}\\nafter=${config.secondMarker}`"
