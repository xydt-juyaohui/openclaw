title: Matrix allowBots=mentions accepts mentioned configured bot messages
scenario:
  id: matrix-allowbots-mentions-mentioned-room
  surface: channels
  coverage:
    primary:
      - channels.access-policy
  execution:
    profiles: { "matrix:all": 38, "matrix:fast": 9, "matrix:transport": 37 }
    kind: flow
    channel: matrix
    timeoutMs: 45000
    retryCount: 0
    config:
      matrixConfigOverrides:
        allowBots: mentions
        configuredBotRoles:
          - observer
        groupAllowRoles:
          - driver
          - observer

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-allowbots.js
  call: runAllowBotsMentionsMentionedRoomScenario
  args:
    - expr: "scenarioContext"
