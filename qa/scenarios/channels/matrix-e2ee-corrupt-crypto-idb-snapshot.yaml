title: Matrix E2EE corrupt crypto snapshot repairs through backup restore
scenario:
  id: matrix-e2ee-corrupt-crypto-idb-snapshot
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  execution:
    profiles: { "matrix:all": 73, "matrix:e2ee-deep": 7 }
    kind: flow
    channel: matrix
    timeoutMs: 180000
    retryCount: 0
    config:
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-corrupt-crypto-idb-snapshot
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Corrupt IDB Snapshot Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee-destructive.js
  call: runMatrixQaE2eeCorruptCryptoIdbSnapshotScenario
  args:
    - expr: "scenarioContext"
