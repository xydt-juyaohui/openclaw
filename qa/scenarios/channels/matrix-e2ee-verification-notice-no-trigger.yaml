title: Matrix E2EE verification notices do not trigger replies
scenario:
  id: matrix-e2ee-verification-notice-no-trigger
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  execution:
    profiles: { "matrix:all": 82, "matrix:e2ee-deep": 16 }
    kind: flow
    channel: matrix
    timeoutMs: 30000
    retryCount: 0
    config:
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-verification-notice-no-trigger
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Verification Notice Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee-messages.js
  call: runMatrixQaE2eeVerificationNoticeNoTriggerScenario
  args:
    - expr: "scenarioContext"
