title: Matrix reaction removals are observed as redactions
scenario:
  id: matrix-reaction-redaction-observed
  surface: channels
  coverage:
    primary:
      - channels.message-actions
  execution:
    profiles: { "matrix:all": 24, "matrix:transport": 23 }
    kind: flow
    channel: matrix
    timeoutMs: 45000
    retryCount: 0
    config:
      matrixRequireCanary: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-reaction.js
  call: runReactionRedactionObservedScenario
  args:
    - expr: "scenarioContext"
